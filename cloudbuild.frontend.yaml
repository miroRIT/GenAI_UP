substitutions:
  _REGION: asia-south1
  _SERVICE: civiciq-web
  _API_URL: https://civiciq-api-placeholder

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_BASE_URL=${_API_URL}
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA
      - ./frontend
  - name: gcr.io/cloud-builders/docker
    args: ["push", "gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA"]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=NEXT_PUBLIC_API_BASE_URL=${_API_URL}
